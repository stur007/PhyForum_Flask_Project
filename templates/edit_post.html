{% extends 'base.html' %}
{% block content %}
<h2>Edit post</h2>
<form method="POST">
    <label>Title</label><br>
    <input type="text" name="title" value="{{ post.title }}" required><br><br>
    <label>Content</label><br>
    <textarea name="content" rows="10" required>{{ post.content }}</textarea><br><br>
    <button type="submit">Save</button>
</form>
{% endblock %}
